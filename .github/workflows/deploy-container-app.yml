name: Build and Deploy Chat App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_NAME: o3r7afglpj35icosureg
  RESOURCE_GROUP: rg-crgar-lab
  CONTAINER_APP_NAME: app-o3r7afglpj35i
  IMAGE_NAME: chat-app

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE_NAME:${{ github.sha }}" \
            --platform linux/amd64 \
            --file Dockerfile \
            .
        working-directory: src

      - name: Update Container App image
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}"

      - name: Set Container App environment variables
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --set-env-vars \
              FOUNDRY_ENDPOINT="${{ secrets.FOUNDRY_ENDPOINT }}" \
              gpt_endpoint="${{ secrets.GPT_ENDPOINT }}" \
              embedding_endpoint="${{ secrets.EMBEDDING_ENDPOINT }}" \
              phi_4_endpoint="${{ secrets.PHI_4_ENDPOINT }}"
